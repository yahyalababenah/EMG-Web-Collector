<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sEMG Data Collector | AI Expo 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    
    <div class="max-w-4xl mx-auto py-8 px-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-700">sEMG Data Acquisition System</h1>
            <p class="text-gray-500 mt-2 font-medium">Target Model: 1D CNN | Web Serial API interface</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-wrap gap-4 justify-between items-center">
            <div class="flex gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Subject ID</label>
                    <input type="number" id="subjectId" value="1" class="border-2 border-gray-300 rounded-lg p-2 w-24 text-center focus:border-blue-500 focus:outline-none font-bold">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Session</label>
                    <input type="number" id="sessionId" value="1" class="border-2 border-gray-300 rounded-lg p-2 w-24 text-center focus:border-blue-500 focus:outline-none font-bold">
                </div>
            </div>
            <div class="flex items-end gap-4">
                <button id="connectBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition-colors shadow-sm">
                    🔌 Connect ESP32
                </button>
                <button id="startSessionBtn" class="bg-gray-400 text-white font-bold py-2.5 px-6 rounded-lg cursor-not-allowed transition-colors" disabled>
                    ▶ Start Protocol
                </button>
            </div>
        </div>

        <div id="prompterBox" class="bg-gray-200 rounded-2xl shadow-inner h-64 flex flex-col items-center justify-center mb-6 transition-all duration-300 border-4 border-dashed border-gray-300">
            <h2 id="prompterText" class="text-6xl font-black text-gray-700 tracking-widest uppercase drop-shadow-sm">Standby</h2>
            <p id="prompterSubtext" class="text-2xl mt-4 text-gray-500 font-medium">Waiting for hardware connection...</p>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6 text-center">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">Current Gesture</p>
                <p id="gestureLabel" class="text-xl font-bold text-blue-600">-</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">Trial Progress</p>
                <p id="trialProgress" class="text-xl font-bold text-blue-600">0 / 10</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold mb-1">Hardware Status</p>
                <p id="connectionStatus" class="text-xl font-bold text-red-500">Disconnected</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-6">
            <canvas id="emgChart" height="80"></canvas>
        </div>

        <div id="downloadArea" class="text-center hidden pb-8">
            <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white font-black text-lg py-4 px-10 rounded-full shadow-lg transition transform hover:scale-105">
                📥 Download CSV Dataset
            </button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
